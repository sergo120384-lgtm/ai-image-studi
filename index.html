<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Studio - Генератор изображений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Панель управления */
        .control-panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: fit-content;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Помощник с промптами */
        .prompt-assistant {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .prompt-assistant h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #667eea;
        }

        .suggestion-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .suggestion-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .suggestion-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* Параметры */
        .params-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }

        /* Кнопка генерации */
        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Панель результата */
        .result-panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .image-container {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .generated-image {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .loading {
            text-align: center;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* История */
        .history {
            margin-top: 30px;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .history h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .history-item {
            cursor: pointer;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: scale(1.05);
        }

        .history-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        /* Уведомления */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 AI Image Studio</h1>
            <p>Генерация изображений с помощью искусственного интеллекта</p>
        </div>

        <div class="main-grid">
            <!-- Левая панель - управление -->
            <div class="control-panel">
                <div class="control-group">
                    <label>🔑 API Token (Hugging Face)</label>
                    <input type="password" id="apiToken" placeholder="Введите ваш HF_TOKEN" style="width: 100%;">
                    <small style="color: #666; display: block; margin-top: 5px;">
                        Получите токен на <a href="https://huggingface.co/settings/tokens" target="_blank">huggingface.co/settings/tokens</a>
                    </small>
                </div>

                <div class="control-group">
                    <label>📝 Ваш запрос (промпт)</label>
                    <textarea id="prompt" rows="4" placeholder="Например: кот в космосе, неон, цифровой арт, 8K"></textarea>
                </div>

                <div class="prompt-assistant">
                    <h3>🤖 Помощник по промптам</h3>
                    <div class="suggestion-buttons" id="suggestions">
                        <button class="suggestion-btn" data-prompt="кот в космосе, неон, детализированный, 8K">Кот в космосе</button>
                        <button class="suggestion-btn" data-prompt="киберпанк город, дождь, неоновые огни, ночь">Киберпанк город</button>
                        <button class="suggestion-btn" data-prompt="фэнтези лес, светящиеся грибы, магия, эльф">Фэнтези лес</button>
                        <button class="suggestion-btn" data-prompt="космическая станция, футуризм, детализированно">Космическая станция</button>
                        <button class="suggestion-btn" data-prompt="акварельный пейзаж, горы, озеро, закат">Акварельный пейзаж</button>
                    </div>
                </div>

                <div class="params-grid">
                    <div class="control-group">
                        <label>🎨 Модель</label>
                        <select id="model">
                            <option value="stabilityai/stable-diffusion-xl-base-1.0">SDXL 1.0 (лучшее качество)</option>
                            <option value="stabilityai/stable-diffusion-2-1">SD 2.1 (быстрее)</option>
                            <option value="prompthero/openjourney-v4">OpenJourney v4 (арт стиль)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>📏 Размер</label>
                        <select id="size">
                            <option value="512">512x512</option>
                            <option value="768">768x768</option>
                            <option value="1024">1024x1024</option>
                        </select>
                    </div>
                </div>

                <div class="control-group">
                    <label>🚫 Негативный промпт (что НЕ рисовать)</label>
                    <input type="text" id="negativePrompt" placeholder="уродливый, размытый, плохое качество">
                </div>

                <button class="generate-btn" id="generateBtn">✨ Сгенерировать изображение</button>
            </div>

            <!-- Правая панель - результат -->
            <div class="result-panel">
                <h3 style="margin-bottom: 15px;">🎯 Результат</h3>
                <div class="image-container" id="imageContainer">
                    <div style="text-align: center; color: #999;">
                        Здесь появится ваше изображение
                    </div>
                </div>
                
                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <button id="downloadBtn" style="flex:1; padding: 10px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer;">💾 Скачать</button>
                    <button id="improveBtn" style="flex:1; padding: 10px; background: #ffc107; color: #333; border: none; border-radius: 10px; cursor: pointer;">🔧 Улучшить промпт</button>
                </div>
            </div>
        </div>

        <!-- История -->
        <div class="history" id="historySection" style="display: none;">
            <h3>📸 История генераций</h3>
            <div class="history-grid" id="historyGrid"></div>
        </div>
    </div>

    <script>
        // Хранилище
        let currentImageBlob = null;
        let history = JSON.parse(localStorage.getItem('imageHistory') || '[]');
        
        // DOM элементы
        const apiTokenInput = document.getElementById('apiToken');
        const promptInput = document.getElementById('prompt');
        const negativePromptInput = document.getElementById('negativePrompt');
        const modelSelect = document.getElementById('model');
        const sizeSelect = document.getElementById('size');
        const generateBtn = document.getElementById('generateBtn');
        const imageContainer = document.getElementById('imageContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const improveBtn = document.getElementById('improveBtn');
        
        // Загрузка сохраненного токена
        const savedToken = localStorage.getItem('hf_token');
        if (savedToken) apiTokenInput.value = savedToken;
        
        // Сохранение токена при вводе
        apiTokenInput.addEventListener('change', () => {
            localStorage.setItem('hf_token', apiTokenInput.value);
        });
        
        // Кнопки-подсказки
        document.querySelectorAll('.suggestion-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const prompt = btn.dataset.prompt;
                promptInput.value = prompt;
                showNotification(`✅ Промпт установлен: ${prompt.substring(0, 50)}...`);
            });
        });
        
        // Улучшение промпта
        improveBtn.addEventListener('click', () => {
            const currentPrompt = promptInput.value;
            if (!currentPrompt) {
                showNotification('❌ Сначала введите промпт', 'error');
                return;
            }
            
            const improved = improvePrompt(currentPrompt);
            promptInput.value = improved;
            showNotification('✨ Промпт улучшен! Попробуйте сгенерировать заново.');
        });
        
        function improvePrompt(prompt) {
            const improvements = [
                'детализированный', 'высокое качество', '8K', 
                'профессиональное освещение', 'реалистичные текстуры'
            ];
            
            let improved = prompt;
            improvements.forEach(imp => {
                if (!improved.toLowerCase().includes(imp.toLowerCase())) {
                    improved += `, ${imp}`;
                }
            });
            
            return improved;
        }
        
        // Генерация изображения
        generateBtn.addEventListener('click', async () => {
            const apiToken = apiTokenInput.value;
            if (!apiToken) {
                showNotification('❌ Введите API токен Hugging Face', 'error');
                return;
            }
            
            const prompt = promptInput.value;
            if (!prompt) {
                showNotification('❌ Введите промпт', 'error');
                return;
            }
            
            const model = modelSelect.value;
            const size = parseInt(sizeSelect.value);
            const negativePrompt = negativePromptInput.value;
            
            // Показываем загрузку
            generateBtn.disabled = true;
            generateBtn.textContent = '⏳ Генерация...';
            imageContainer.innerHTML = '<div class="loading"><div class="spinner"></div><p>Генерируем изображение... Это может занять 10-30 секунд</p></div>';
            
            try {
                const imageBlob = await generateImage(apiToken, prompt, model, size, negativePrompt);
                currentImageBlob = imageBlob;
                
                // Отображаем изображение
                const imageUrl = URL.createObjectURL(imageBlob);
                imageContainer.innerHTML = `<img src="${imageUrl}" class="generated-image" alt="Generated image">`;
                
                // Сохраняем в историю
                saveToHistory(imageUrl, prompt);
                
                showNotification('✅ Изображение успешно сгенерировано!');
            } catch (error) {
                console.error('Ошибка:', error);
                let errorMsg = 'Ошибка генерации: ';
                
                if (error.message.includes('401')) {
                    errorMsg += 'Неверный API токен';
                } else if (error.message.includes('503')) {
                    errorMsg += 'Модель загружается, попробуйте через 30 секунд';
                } else if (error.message.includes('429')) {
                    errorMsg += 'Превышен лимит запросов. Подождите час';
                } else {
                    errorMsg += error.message;
                }
                
                imageContainer.innerHTML = `<div style="text-align: center; color: #e74c3c; padding: 40px;">
                    <h3>❌ ${errorMsg}</h3>
                    <p style="margin-top: 10px;">Проверьте токен и попробуйте снова</p>
                </div>`;
                showNotification(errorMsg, 'error');
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '✨ Сгенерировать изображение';
            }
        });
        
        async function generateImage(apiToken, prompt, model, size, negativePrompt) {
            const API_URL = `https://xget.xi-xu.me/hf/models/${model}`;
            
            const payload = {
                inputs: prompt,
                parameters: {
                    negative_prompt: negativePrompt || "ugly, blurry, bad quality",
                    width: size,
                    height: size,
                    num_inference_steps: 30
                }
            };
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            
            if (!response.ok) {
                const error = await response.text();
                throw new Error(`${response.status}: ${error.substring(0, 100)}`);
            }
            
            return await response.blob();
        }
        
        // Скачивание
        downloadBtn.addEventListener('click', () => {
            if (!currentImageBlob) {
                showNotification('❌ Нет изображения для скачивания', 'error');
                return;
            }
            
            const url = URL.createObjectURL(currentImageBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ai_image_${Date.now()}.png`;
            a.click();
            URL.revokeObjectURL(url);
            showNotification('💾 Изображение сохранено');
        });
        
        // Сохранение в историю
        function saveToHistory(imageUrl, prompt) {
            const historyItem = {
                id: Date.now(),
                imageUrl: imageUrl,
                prompt: prompt,
                timestamp: new Date().toLocaleString()
            };
            
            history.unshift(historyItem);
            if (history.length > 20) history.pop();
            
            localStorage.setItem('imageHistory', JSON.stringify(history));
            updateHistoryDisplay();
        }
        
        function updateHistoryDisplay() {
            const historySection = document.getElementById('historySection');
            const historyGrid = document.getElementById('historyGrid');
            
            if (history.length > 0) {
                historySection.style.display = 'block';
                historyGrid.innerHTML = history.map(item => `
                    <div class="history-item" onclick="loadFromHistory(${item.id})">
                        <img src="${item.imageUrl}" alt="History">
                        <div style="padding: 5px; font-size: 11px; text-overflow: ellipsis; overflow: hidden;">
                            ${item.prompt.substring(0, 30)}...
                        </div>
                    </div>
                `).join('');
            }
        }
        
        window.loadFromHistory = (id) => {
            const item = history.find(h => h.id === id);
            if (item) {
                promptInput.value = item.prompt;
                imageContainer.innerHTML = `<img src="${item.imageUrl}" class="generated-image" alt="History">`;
                
                // Конвертируем URL в Blob для скачивания
                fetch(item.imageUrl)
                    .then(res => res.blob())
                    .then(blob => currentImageBlob = blob);
                    
                showNotification('📸 Загружено из истории');
            }
        };
        
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.background = type === 'error' ? '#e74c3c' : '#333';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        // Загружаем историю при старте
        updateHistoryDisplay();
    </script>
</body>
</html>
